app-id: io.github.Adda0.Stardrop
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.dotnet8
build-options:
    append-path: /usr/lib/sdk/dotnet8/bin
    append-ld-library-path: /usr/lib/sdk/dotnet8/lib
    prepend-pkg-config-path: /usr/lib/sdk/dotnet8/lib/pkgconfig
command: "Stardrop"
finish-args:
  - "--socket=x11"
  - "--share=ipc"
  - "--share=network"
  - "--device=dri"
  - "--filesystem=home"
  - "--socket=pulseaudio"
modules:
  - name: Stardrop
    buildsystem: simple
    build-commands:
      - "install-sdk.sh"
      - "dotnet publish -c Release --source ./nuget-sources Stardrop/Stardrop.csproj --self-contained true"
      - cp -r --remove-destination /run/build/Stardrop/Stardrop/bin/Release/linux-*/publish/* /app/bin/
    sources:
      - nuget-sources.json
      - type: archive
        url: "https://github.com/Adda0/Stardrop/archive/refs/tags/v1.8.4-beta.2-custom_adda.3.tar.gz"
        sha256: 27842763ae075f0383e9043b1c3ead6375319d1cfd252fe4a21888831d14633b
      - type: file
        path: global.json
  - name: Meta
    buildsystem: simple
    build-commands:
      - install -Dm644 $FLATPAK_ID.metainfo.xml /app/share/metainfo/$FLATPAK_ID.metainfo.xml
      - install -Dm644 $FLATPAK_ID.desktop /app/share/applications/$FLATPAK_ID.desktop
      - install -Dm644 Stardrop_512x512x32.png /app/share/icons/hicolor/512x512/apps/$FLATPAK_ID.png
    sources:
      - type: file
        path: io.github.Adda0.Stardrop.metainfo.xml
      - type: file
        path: io.github.Adda0.Stardrop.desktop
      - type: file
        path: Stardrop_512x512x32.png
